version: '3.8'

services:
  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn scoremanager.wsgi:application --bind 0.0.0.0:8007 --workers 3"
    volumes:
      - sqlite_data:/code/db
      - media_data:/code/media
      - static_data:/code/staticfiles
    expose:
      - "8007"
    env_file:
      - .env
    environment:
      - DJANGO_DB_PATH=/code/db/db.sqlite3
    restart: unless-stopped

  # nginx:
  #   image: nginx:1.25-alpine
