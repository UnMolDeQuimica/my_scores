  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - static_data:/code/staticfiles:ro
  #     - media_data:/code/media:ro
  #   ports:
  #     - "8006:80"
  #   depends_on:
  #     - web
  #   restart: unless-stopped

volumes:
  sqlite_data:
  media_data:
  static_data:
