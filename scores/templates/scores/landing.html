{% extends "scores/base.html" %}
{% block title %}Score Manager{% endblock %}

{% block anon_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #1e293b 0%, #334155 100%);">
    <div style="text-align:center; color:#e2e8f0; max-width:480px; padding:2rem;">
        <div style="font-size:3rem; margin-bottom:1rem;">
            <i class="bi bi-music-note-list"></i>
        </div>
        <h1 style="font-weight:700; font-size:2rem; margin-bottom:.5rem; color:#fff;">Score Manager</h1>
        <p style="font-size:1.05rem; color:#94a3b8; margin-bottom:2rem;">
            Upload, organize, and view your MusicXML scores with an interactive sheet music display.
        </p>
        <a href="{% url 'login' %}" class="btn btn-light btn-lg px-4" style="font-weight:600;">
            <i class="bi bi-box-arrow-in-right me-1"></i> Log in
        </a>
    </div>
</div>
{% endblock %}
