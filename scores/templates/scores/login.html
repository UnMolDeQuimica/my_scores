{% extends "scores/base.html" %}
{% block title %}Log in — Score Manager{% endblock %}

{% block anon_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #1e293b 0%, #334155 100%);">
    <div style="background:#fff; border-radius:.75rem; padding:2.5rem; width:100%; max-width:400px; box-shadow:0 4px 24px rgba(0,0,0,.15);">
        <div style="text-align:center; margin-bottom:1.5rem;">
            <i class="bi bi-music-note-list" style="font-size:2rem; color:#1e293b;"></i>
            <h2 style="font-weight:700; margin-top:.5rem;">Log in</h2>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                {{ form.email }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
                Log in
            </button>
        </form>

        <div style="text-align:center; margin-top:1.25rem;">
            <a href="{% url 'landing' %}" style="color:#64748b; font-size:.85rem;">← Back to home</a>
        </div>
    </div>
</div>
{% endblock %}
